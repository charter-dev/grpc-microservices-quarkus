# ─────────────────────────────────────────────────────────────
#  User Service — Application Configuration
# ─────────────────────────────────────────────────────────────

# Service name (appears in logs and health checks)
quarkus.application.name=user-service
quarkus.application.version=1.0.0

# ── HTTP Server (REST health endpoints) ──
quarkus.http.port=8081

# ── gRPC Server ──
# This is where other services connect via gRPC
quarkus.grpc.server.port=9000

# Enable gRPC reflection (useful for grpcurl / Postman / BloomRPC)
# Allows clients to discover available services without .proto files
quarkus.grpc.server.enable-reflection-service=true

# Use plaintext (no TLS) for local development
# In production: set quarkus.grpc.server.ssl.certificate and .key
quarkus.grpc.server.plain-text=true

# ── Logging ──
quarkus.log.level=INFO
quarkus.log.category."com.portfolio".level=DEBUG

# ── Dev Mode Settings ──
%dev.quarkus.log.level=DEBUG
%dev.quarkus.grpc.server.port=9000
%dev.quarkus.http.port=8081

# ── Docker / Container Profile ──
%docker.quarkus.http.host=0.0.0.0
%docker.quarkus.grpc.server.host=0.0.0.0
