# ─────────────────────────────────────────────────────────────
#  API Gateway — Application Configuration
# ─────────────────────────────────────────────────────────────

quarkus.application.name=api-gateway
quarkus.application.version=1.0.0

# ── HTTP Server ──
quarkus.http.port=8080

# ─────────────────────────────────────────────────────────────
#  gRPC Client Configuration
#
#  This is the KEY section — it tells the @GrpcClient injected stubs
#  WHERE to connect to each upstream service.
#
#  Format: quarkus.grpc.clients.<client-name>.host
#          quarkus.grpc.clients.<client-name>.port
#
#  The <client-name> must match the value in @GrpcClient("name")
# ─────────────────────────────────────────────────────────────

# user-service gRPC client
quarkus.grpc.clients.user-service.host=user-service
quarkus.grpc.clients.user-service.port=9000
quarkus.grpc.clients.user-service.plain-text=true

# order-service gRPC client
quarkus.grpc.clients.order-service.host=order-service
quarkus.grpc.clients.order-service.port=9001
quarkus.grpc.clients.order-service.plain-text=true

# ── Logging ──
quarkus.log.level=INFO
quarkus.log.category."com.portfolio".level=DEBUG

# ─────────────────────────────────────────────────────────────
#  Dev Profile — connect to localhost (running services manually)
# ─────────────────────────────────────────────────────────────
%dev.quarkus.grpc.clients.user-service.host=localhost
%dev.quarkus.grpc.clients.user-service.port=9000
%dev.quarkus.grpc.clients.order-service.host=localhost
%dev.quarkus.grpc.clients.order-service.port=9001
%dev.quarkus.http.port=8080
%dev.quarkus.log.level=DEBUG

# ─────────────────────────────────────────────────────────────
#  Docker Profile — connect to Docker service names
# ─────────────────────────────────────────────────────────────
%docker.quarkus.http.host=0.0.0.0
%docker.quarkus.grpc.clients.user-service.host=user-service
%docker.quarkus.grpc.clients.order-service.host=order-service
