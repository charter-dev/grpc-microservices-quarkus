# ─────────────────────────────────────────────────────────────
#  Order Service — Application Configuration
# ─────────────────────────────────────────────────────────────

quarkus.application.name=order-service
quarkus.application.version=1.0.0

# ── HTTP Server ──
quarkus.http.port=8082

# ── gRPC Server ──
quarkus.grpc.server.port=9001
quarkus.grpc.server.enable-reflection-service=true
quarkus.grpc.server.plain-text=true

# ── Logging ──
quarkus.log.level=INFO
quarkus.log.category."com.portfolio".level=DEBUG

# ── Dev Profile ──
%dev.quarkus.log.level=DEBUG
%dev.quarkus.grpc.server.port=9001
%dev.quarkus.http.port=8082

# ── Docker Profile ──
%docker.quarkus.http.host=0.0.0.0
%docker.quarkus.grpc.server.host=0.0.0.0
