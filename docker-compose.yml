version: "3.9"

# ─────────────────────────────────────────────────────────────────────
#  Docker Compose — gRPC Microservices Portfolio
#
#  Services:
#    user-service  → gRPC :9000  | HTTP :8081
#    order-service → gRPC :9001  | HTTP :8082
#    api-gateway   → HTTP :8080  (public entry point)
#
#  Run:  docker-compose up --build
#  Stop: docker-compose down
# ─────────────────────────────────────────────────────────────────────

services:

  # ── User Service ──────────────────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"   # HTTP health endpoint
      - "9000:9000"   # gRPC server
    environment:
      - QUARKUS_PROFILE=docker
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Order Service ─────────────────────────────────────────────────
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8082:8082"   # HTTP health endpoint
      - "9001:9001"   # gRPC server
    environment:
      - QUARKUS_PROFILE=docker
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── API Gateway ───────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"   # Public HTTP entry point
    environment:
      - QUARKUS_PROFILE=docker
    networks:
      - microservices-net
    depends_on:
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ── Network ───────────────────────────────────────────────────────────
networks:
  microservices-net:
    driver: bridge
    name: microservices-net
